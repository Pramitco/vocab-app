<!DOCTYPE html>
<html>
<head>
    <title>Educational Agar Free Vocabulary App</title>
    <meta name="description" content="Educational Agar provides a Free vocabulary app to save and learn new words easily for students">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="htRetzBwFGUVh_P15e9NFURD0FrC_pCszJSsBs8-kNo" />

    <style>
        body {
            font-family: Arial;
            background: #f4f6ff;
            text-align: center;
            padding: 10px;
        }

        h1 {
            font-size: 22px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .save { background: green; color: white; }
        .delete { background: red; color: white; }
        .search { background: blue; color: white; }

        #count {
            margin: 10px;
            font-weight: bold;
        }

        .card {
            background: white;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<h1>📘 Vocabulary App</h1>
    <h2>Enter word to get meaning </h2>
    
    <input type="text" id="wordInput" placeholder="Enter a word">
<button onclick="getMeaning()">Search</button>

<div id="result"></div>

<input type="text" id="word" placeholder="Enter Word">
<input type="text" id="meaning" placeholder="Enter Meaning">

<button class="save" onclick="saveWord()">Save Word</button>

<input type="text" id="search" placeholder="Search Word">

<button class="search" onclick="searchWord()">Search</button>
<button class="delete" onclick="deleteWord()">Delete Word</button>

<div id="count">Total Words: 0</div>

<div id="list"></div>

<script>

let vocab = JSON.parse(localStorage.getItem("vocab")) || [];
let defaultWords = [
{word:"abandon",meaning:"to leave completely"},
{word:"ability",meaning:"power or skill"},
{word:"able",meaning:"having the power to do something"},
{word:"apple",meaning:"a fruit"},
{word:"book",meaning:"collection of pages"},
{ word: "Aberration", meaning: "A departure from what is normal or expected" },
{ word: "Alacrity", meaning: "Brisk and cheerful readiness" },
{ word: "Anachronistic", meaning: "Belonging to a period other than that being portrayed" },
{ word: "Apathetic", meaning: "Showing little or no emotion or interest" },
{ word: "Arduous", meaning: "Involving or requiring strenuous effort" },
{ word: "Austere", meaning: "Severe or strict in manner or appearance" },
{ word: "Benevolent", meaning: "Well meaning and kindly" },
{ word: "Cacophony", meaning: "A harsh mixture of sounds" },
{ word: "Capricious", meaning: "Given to sudden changes of mood or behavior" },
{ word: "Clandestine", meaning: "Kept secret or done secretly" },
{ word: "Coerce", meaning: "To force someone to do something" },
{ word: "Conundrum", meaning: "A confusing and difficult problem" },
{ word: "Deleterious", meaning: "Causing harm or damage" },
{ word: "Demure", meaning: "Reserved, modest, and shy" },
{ word: "Didactic", meaning: "Intended to teach or instruct" },
{ word: "Disparate", meaning: "Essentially different in kind" },
{ word: "Ebullient", meaning: "Cheerful and full of energy" },
{ word: "Enigma", meaning: "A person or thing that is mysterious" },
{ word: "Ephemeral", meaning: "Lasting for a very short time" },
{ word: "Erudite", meaning: "Having great knowledge or learning" },
{ word: "Esoteric", meaning: "Intended for a small number of people with special knowledge" },
{ word: "Euphemism", meaning: "A mild expression used instead of a harsh one" },
{ word: "Exacerbate", meaning: "To make a problem worse" },
{ word: "Fastidious", meaning: "Very attentive to detail" },
{ word: "Furtive", meaning: "Attempting to avoid notice" },
{ word: "Garrulous", meaning: "Excessively talkative" },
{ word: "Harbinger", meaning: "A sign of something to come" },
{ word: "Impetuous", meaning: "Acting quickly without thought" }, 
{ word: "Incessant", meaning: "Continuing without pause" },
{ word: "Indolent", meaning: "Wanting to avoid activity; lazy" },
{ word: "Ineffable", meaning: "Too great to be expressed in words" },
{ word: "Juxtaposition", meaning: "Placing things side by side for comparison" },
{ word: "Lethargic", meaning: "Sluggish and lacking energy" },
{ word: "Magnanimous", meaning: "Very generous or forgiving" },
{ word: "Malevolent", meaning: "Having ill will or wishing harm" },
{ word: "Meticulous", meaning: "Showing great attention to detail" },
{ word: "Nefarious", meaning: "Wicked or criminal" },
{ word: "Obfuscate", meaning: "To make something unclear" },
{ word: "Ostentatious", meaning: "Showy and designed to impress" },
{ word: "Paradox", meaning: "A seemingly contradictory statement" },
{ word: "Perfunctory", meaning: "Carried out with minimal effort" },
{ word: "Pernicious", meaning: "Having a harmful effect" },
{ word: "Quintessential", meaning: "Representing the most perfect example" },
{ word: "Recalcitrant", meaning: "Stubbornly refusing authority" },
{ word: "Sanguine", meaning: "Optimistic or positive" },
{ word: "Serendipity", meaning: "Finding something good by chance" },
{ word: "Taciturn", meaning: "Reserved or uncommunicative" },
{ word: "Ubiquitous", meaning: "Present everywhere" },
{ word: "Vehement", meaning: "Showing strong feeling" },
{ word: "Wistful", meaning: "Having a feeling of vague longing" }    
];

let stored = JSON.parse(localStorage.getItem("vocab"));

if(stored && stored.length > 0){
    vocab = stored;
} else {
    vocab = defaultWords;
    localStorage.setItem("vocab", JSON.stringify(vocab));
}

function render(data) {
    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<b>${item.word}</b><br>${item.meaning}`;
        list.appendChild(div);
    });

    document.getElementById("count").innerText = "Total Words: " + data.length;
}

function saveWord() {
    let word = document.getElementById("word").value;
    let meaning = document.getElementById("meaning").value;

    if(word === "" || meaning === "") return;

    vocab.push({word, meaning});
    localStorage.setItem("vocab", JSON.stringify(vocab));

    document.getElementById("word").value = "";
    document.getElementById("meaning").value = "";

    render(vocab);
}

function searchWord() {
    let search = document.getElementById("search").value.toLowerCase();
    let filtered = vocab.filter(item => item.word.toLowerCase().includes(search));
    render(filtered);
}

function deleteWord() {
    let text = document.getElementById("word").value.toLowerCase();

    if(text === "") {
        text = document.getElementById("search").value.toLowerCase();
    }

    vocab = vocab.filter(item => item.word.toLowerCase() !== text);
    localStorage.setItem("vocab", JSON.stringify(vocab));

    document.getElementById("word").value = "";
    document.getElementById("search").value = "";

    render(vocab);
}

render(vocab);

</script>

   <script>
    async function getMeaning() {
    let word = document.getElementById("wordInput").value.toLowerCase();

    if (word === "") {
        alert("Please enter a word");
        return;
    }

    // ✅ Check from your saved words (vocab)
    let foundWord = vocab.find(item => item.word.toLowerCase() === word);

    if (foundWord) {
        document.getElementById("result").innerHTML = `
    <h3>${foundWord.word}</h3>
    <p>${foundWord.meaning}</p>
    <button onclick="saveDirect('${foundWord.word}','${foundWord.meaning}')">Save Word</button>
`;
        return;
    }

    // ✅ If not found → use API
    let url = `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`;

    try {
        let response = await fetch(url);

        if (!response.ok) throw new Error("Not found");

        let data = await response.json();
        let meaning = data[0].meanings[0].definitions[0].definition;

       document.getElementById("result").innerHTML = `
    <h3>${word}</h3>
    <p>${meaning}</p>
       <button onclick="saveDirect('${word}','${meaning}')">Save Word</button>
`;

    } catch (error) {
        getBasicMeaning(word); // fallback
    }
}
       function saveDirect(word, meaning) {
    if(!word || !meaning) return;

    vocab.push({word, meaning});
    localStorage.setItem("vocab", JSON.stringify(vocab));
    render(vocab);
}
       async function getBasicMeaning(word) {
    document.getElementById("result").innerHTML = "No meaning found 😢";
}

   
</script> 

</body>
</html>
